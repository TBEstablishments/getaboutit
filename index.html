<canvas id="bg" aria-hidden="true"></canvas>
<div id="scanlines" aria-hidden="true"></div>
<div id="vignette" aria-hidden="true"></div>

<main id="home">
  <header class="hero">
    <a id="achBadge" class="ach-badge" href="/settings" aria-label="Achievements"><span class="chip">✦ <span id="achCount">0</span>/<span id="achTotal">9</span></span></a>
    <h1 id="wordmark" class="wordmark chrom chrom-jitter"><span>GETABOUTIT</span></h1>
    <p class="tagline">free arcade · no signup · just play</p>
    <p class="stat-strip" id="stat-strip" aria-live="polite">
      🕹 37 GAMES · ⚡ <span id="taps-count">0</span> TAPS · <span id="streak-emoji">🔥</span> <span id="streak-count">0</span> DAY STREAK
    </p>
    <p class="motd" id="motd"></p>
  </header>

  <section class="daily-trio" id="dailyTrio" aria-label="Today's challenges">
    <h2 class="recent-label">TODAY'S CHALLENGES</h2>
    <div class="daily-strip" id="dailyStrip"></div>
  </section>

  <section class="pinned hidden" id="pinned" aria-label="Pinned">
    <h2 class="recent-label">📌 PINNED</h2>
    <div class="pinned-strip" id="pinnedStrip"></div>
  </section>

  <section class="recent hidden" id="recent" aria-label="Recently played">
    <h2 class="recent-label">RECENTLY PLAYED</h2>
    <div class="recent-strip" id="recent-strip"></div>
  </section>

  <div class="search-row">
    <input id="searchInput" class="search-input" type="search" placeholder='SEARCH (PRESS "/")' aria-label="Search games" />
    <button id="searchClear" class="search-toggle" type="button" aria-label="Clear search">×</button>
  </div>

  <nav class="tabs" id="tabs" aria-label="Game categories">
    <button class="tab active" data-cat="all">ALL</button>
    <button class="tab" data-cat="arcade">ARCADE</button>
    <button class="tab" data-cat="puzzle">PUZZLE</button>
    <button class="tab" data-cat="board">BOARD</button>
    <button class="tab" data-cat="cards">CARDS</button>
    <button class="tab" data-cat="casino">CASINO</button>
    <button class="tab" data-cat="mind">MIND</button>
    <button class="tab" data-cat="skill">SKILL</button>
  </nav>

  <section class="grid" id="grid" aria-label="Game grid"></section>

  <footer class="foot">
    made with care · vanilla js · no tracking · <a href="/stats" class="foot-link">stats</a> · <a href="/settings" class="foot-link">settings</a> · <span id="themeIndicator"></span>
  </footer>
</main>
