<body>

<canvas id="bg" aria-hidden="true"></canvas>
<div id="scanlines" aria-hidden="true"></div>
<div id="vignette" aria-hidden="true"></div>

<main id="home">
  <header class="hero">
    <h1 id="wordmark" class="wordmark chrom chrom-jitter"><span>GETABOUTIT</span></h1>
    <p class="tagline">free arcade · no signup · just play</p>
    <p class="stat-strip" id="stat-strip" aria-live="polite">
      🕹 17 GAMES · ⚡ <span id="taps-count">0</span> TAPS · <span id="streak-emoji">🔥</span> <span id="streak-count">0</span> DAY STREAK
    </p>
    <p class="motd" id="motd"></p>
  </header>

  <a href="#" class="daily-ribbon" id="daily-ribbon">
    <span class="d-mark">✦ DAILY PICK ✦</span>
    <span class="d-name chrom"><span id="daily-name">STACK</span></span>
    <span class="d-arrow">→</span>
  </a>

  <section class="recent hidden" id="recent" aria-label="Recently played">
    <h2 class="recent-label">RECENTLY PLAYED</h2>
    <div class="recent-strip" id="recent-strip"></div>
  </section>

  <section class="grid" id="grid" aria-label="Game grid"></section>

  <footer class="foot">made with care · vanilla js · no tracking</footer>
</main>

<button id="surprise" class="arcade green" type="button" aria-label="Surprise me — random game">🎲 SURPRISE ME</button>
