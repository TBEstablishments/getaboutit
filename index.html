<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a1e" />
<title>GETABOUTIT</title>
<meta name="description" content="how high can you go · a one-tap stacking game" />

<meta property="og:type" content="website" />
<meta property="og:url" content="https://getaboutit.com/" />
<meta property="og:title" content="GETABOUTIT" />
<meta property="og:description" content="how high can you go · a one-tap stacking game" />
<meta property="og:image" content="https://getaboutit.com/og.png" />

<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="GETABOUTIT" />
<meta name="twitter:description" content="how high can you go · a one-tap stacking game" />

<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect x='4' y='10' width='18' height='14' fill='%2300f5ff'/><rect x='10' y='4' width='18' height='14' fill='%23ff006e'/></svg>" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />

<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="stage">
  <canvas id="game"></canvas>
  <div id="scanlines" aria-hidden="true"></div>

  <!-- HUD: in-game -->
  <div id="hud" class="hidden">
    <div id="hud-floor"><span class="chrom" data-text="1"><span>1</span></span></div>
    <div id="hud-perfect" class="hidden"><span id="perfect-count">×2</span> PERFECT</div>
    <div id="hud-today">TODAY 0</div>
    <button id="mute" type="button" aria-label="Toggle sound">🔊</button>
  </div>

  <!-- Splash -->
  <div id="splash" class="screen">
    <h1 class="wordmark chrom" data-text="GETABOUTIT"><span>GETABOUTIT</span></h1>
    <p class="subtitle">how high can you go</p>
    <p class="tap-prompt">▶ TAP TO PLAY</p>
    <p class="daily-tag"><span id="daily-date">DAILY</span></p>
  </div>

  <!-- Game Over -->
  <div id="gameover" class="screen hidden">
    <h2 class="collapse glitch" data-text="TOWER COLLAPSE">TOWER COLLAPSE</h2>
    <div class="final-floor chrom" data-text="0"><span id="final-floor">0</span></div>
    <div class="stats">
      <span>BEST <b id="stat-best">0</b></span>
      <span class="sep">·</span>
      <span>TODAY <b id="stat-today">0</b></span>
      <span class="sep">·</span>
      <span>ALLTIME <b id="stat-alltime">0</b></span>
    </div>
    <pre id="scorecard" class="scorecard"></pre>
    <div class="buttons">
      <button id="btn-copy" class="arcade" type="button">COPY</button>
      <button id="btn-share" class="arcade" type="button">SHARE</button>
    </div>
    <p class="tap-prompt retry">▶ TAP TO RETRY</p>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
