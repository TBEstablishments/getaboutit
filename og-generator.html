<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>GETABOUTIT — OG image generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<style>
  html, body {
    margin: 0;
    background: #0a0a1e;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    min-height: 100dvh;
  }
  .wrap {
    max-width: 1280px;
    margin: 0 auto;
    padding: 32px 24px 96px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  h1 { font-size: 20px; letter-spacing: 0.08em; }
  p  { font-size: 12px; line-height: 1.6; color: #06ffa5; max-width: 60ch; }
  .preview {
    background: #000;
    border: 2px solid #8338ec;
    padding: 8px;
    width: fit-content;
    max-width: 100%;
    overflow: auto;
  }
  canvas { display: block; max-width: 100%; height: auto; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  button {
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.08em;
    background: #ff006e;
    color: #fff;
    border: none;
    padding: 12px 18px;
    cursor: pointer;
    box-shadow: 0 0 0 3px #0a0a1e, 0 0 0 5px #ff006e;
  }
  button.cyan   { background: #00f5ff; color: #0a0a1e; box-shadow: 0 0 0 3px #0a0a1e, 0 0 0 5px #00f5ff; }
  button.green  { background: #06ffa5; color: #0a0a1e; box-shadow: 0 0 0 3px #0a0a1e, 0 0 0 5px #06ffa5; }
  button.yellow { background: #ffd60a; color: #0a0a1e; box-shadow: 0 0 0 3px #0a0a1e, 0 0 0 5px #ffd60a; }
  button:active { transform: translateY(2px); }
  hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 18px 0; }
  .label { font-size: 10px; color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<div class="wrap">

  <h1>GETABOUTIT — image generator</h1>
  <p>Render each asset, then click its download button. Save into the repo root next to <code>index.html</code>.</p>

  <hr/>

  <div>
    <p class="label">og.png — 1200 × 630 (Open Graph / Twitter card)</p>
    <div class="preview"><canvas id="og" width="1200" height="630"></canvas></div>
    <div class="row" style="margin-top:12px">
      <button onclick="render('og'); download('og','og.png')">Render &amp; Download og.png</button>
    </div>
  </div>

  <hr/>

  <div>
    <p class="label">apple-touch-icon.png — 180 × 180</p>
    <div class="preview"><canvas id="apple" width="180" height="180"></canvas></div>
    <div class="row" style="margin-top:12px">
      <button class="cyan" onclick="render('apple'); download('apple','apple-touch-icon.png')">Render &amp; Download apple-touch-icon.png</button>
    </div>
  </div>

  <hr/>

  <div>
    <p class="label">favicon.png — 32 × 32 (PNG fallback for favicon.svg)</p>
    <div class="preview" style="image-rendering: pixelated"><canvas id="favicon" width="32" height="32" style="width:128px;height:128px"></canvas></div>
    <div class="row" style="margin-top:12px">
      <button class="green" onclick="render('favicon'); download('favicon','favicon.png')">Render &amp; Download favicon.png</button>
    </div>
  </div>

  <hr/>

  <div class="row">
    <button class="yellow" onclick="renderAll()">Render All Previews</button>
  </div>

</div>

<script>
const PAL = ['#ff006e','#d100d1','#8338ec','#3a0ca3','#4361ee','#00f5ff','#06ffa5','#ffd60a','#ff9500','#ef233c'];
const COS30 = Math.cos(Math.PI/6);
const SIN30 = Math.sin(Math.PI/6);

function shade(hex, m) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*m)},${Math.round(g*m)},${Math.round(b*m)})`;
}

function drawBackground(ctx, W, H) {
  // Deep space gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#01000c');
  sky.addColorStop(0.6, '#0a0220');
  sky.addColorStop(1, '#1a0635');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Starfield
  const rand = mulberry32(202405);
  for (let i = 0; i < Math.round(W * H / 2400); i++) {
    const x = rand() * W;
    const y = rand() * H * 0.95;
    const sz = rand() * 2 + 0.6;
    ctx.fillStyle = `rgba(255,255,255,${(0.4 + rand() * 0.6).toFixed(3)})`;
    ctx.fillRect(x, y, sz, sz);
  }

  // Nebula glow (magenta-cyan)
  const nebG1 = ctx.createRadialGradient(W * 0.25, H * 0.55, 20, W * 0.25, H * 0.55, W * 0.45);
  nebG1.addColorStop(0, 'rgba(255, 0, 200, 0.45)');
  nebG1.addColorStop(0.5, 'rgba(131, 56, 236, 0.20)');
  nebG1.addColorStop(1, 'rgba(80, 30, 140, 0)');
  ctx.fillStyle = nebG1;
  ctx.fillRect(0, 0, W, H);

  const nebG2 = ctx.createRadialGradient(W * 0.78, H * 0.28, 10, W * 0.78, H * 0.28, W * 0.4);
  nebG2.addColorStop(0, 'rgba(0, 245, 255, 0.40)');
  nebG2.addColorStop(0.6, 'rgba(0, 100, 200, 0.10)');
  nebG2.addColorStop(1, 'rgba(0, 60, 120, 0)');
  ctx.fillStyle = nebG2;
  ctx.fillRect(0, 0, W, H);

  // Galaxy spiral, top-right
  ctx.save();
  ctx.translate(W * 0.82, H * 0.20);
  ctx.rotate(0.4);
  const galG = ctx.createRadialGradient(0, 0, 6, 0, 0, Math.min(W, H) * 0.25);
  galG.addColorStop(0, 'rgba(255,210,255,0.9)');
  galG.addColorStop(0.35, 'rgba(180,120,220,0.45)');
  galG.addColorStop(1, 'rgba(80,40,140,0)');
  ctx.fillStyle = galG;
  ctx.beginPath();
  ctx.ellipse(0, 0, Math.min(W, H) * 0.22, Math.min(W, H) * 0.06, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Earth's curved horizon at very bottom
  const earthY = H * 1.15;
  const earthR = W * 0.95;
  const eg = ctx.createRadialGradient(W/2, earthY, earthR * 0.7, W/2, earthY, earthR * 1.05);
  eg.addColorStop(0, '#1a4d8c');
  eg.addColorStop(0.6, '#0a2540');
  eg.addColorStop(1, '#020010');
  ctx.fillStyle = eg;
  ctx.beginPath();
  ctx.arc(W/2, earthY, earthR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 245, 255, 0.5)';
  ctx.lineWidth = Math.max(2, W/450);
  ctx.beginPath();
  ctx.arc(W/2, earthY, earthR + 2, Math.PI + 0.25, 2 * Math.PI - 0.25);
  ctx.stroke();
}

function mulberry32(seed) {
  let s = seed >>> 0;
  return function () {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function drawIsoBlock(ctx, cx, cy, w, d, h, color) {
  // cx, cy = on-screen anchor for bottom front-right vertex of rhombus
  // simplified: just draw a stack illustration block
  const sx = w * COS30 / 2;
  const sy = w * SIN30 / 2;
  const dx = d * COS30 / 2;
  const dy = d * SIN30 / 2;

  const tFR = { x: cx,        y: cy - h };
  const tBR = { x: cx + sx*2, y: cy - sy*2 - h };
  const tBL = { x: cx,        y: cy - sy*2 - dy*2 - h };
  const tFL = { x: cx - dx*2, y: cy - dy*2 - h };

  const bFR = { x: cx,        y: cy };
  const bBR = { x: cx + sx*2, y: cy - sy*2 };
  const bFL = { x: cx - dx*2, y: cy - dy*2 };

  // Right face
  ctx.fillStyle = shade(color, 0.70);
  ctx.beginPath();
  ctx.moveTo(tFR.x, tFR.y);
  ctx.lineTo(tBR.x, tBR.y);
  ctx.lineTo(bBR.x, bBR.y);
  ctx.lineTo(bFR.x, bFR.y);
  ctx.closePath();
  ctx.fill();

  // Front face
  ctx.fillStyle = shade(color, 0.55);
  ctx.beginPath();
  ctx.moveTo(tFR.x, tFR.y);
  ctx.lineTo(tFL.x, tFL.y);
  ctx.lineTo(bFL.x, bFL.y);
  ctx.lineTo(bFR.x, bFR.y);
  ctx.closePath();
  ctx.fill();

  // Top
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(tFR.x, tFR.y);
  ctx.lineTo(tBR.x, tBR.y);
  ctx.lineTo(tBL.x, tBL.y);
  ctx.lineTo(tFL.x, tFL.y);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 1.4;
  ctx.stroke();
}

function chromText(ctx, text, x, y, size, font) {
  ctx.font = `${size}px ${font || "'Press Start 2P', monospace"}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff006e';
  ctx.fillText(text, x + Math.max(2, size*0.04), y);
  ctx.fillStyle = '#00f5ff';
  ctx.fillText(text, x - Math.max(2, size*0.04), y);
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, x, y);
}

function scanlines(ctx, W, H, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#000';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);
  ctx.restore();
}

function renderOG() {
  const canvas = document.getElementById('og');
  const ctx = canvas.getContext('2d');
  const W = 1200, H = 630;
  ctx.clearRect(0, 0, W, H);
  drawBackground(ctx, W, H);

  // Tall iso tower illustration on the right — reaches the void
  const baseX = W * 0.82;
  const baseY = H * 0.92;
  const bw = 96, bd = 96, bh = 22;
  const tallStack = 14;
  for (let i = 0; i < tallStack; i++) {
    const shrink = 1 - i * 0.018;
    drawIsoBlock(ctx, baseX, baseY - i * bh, bw * shrink, bd * shrink, bh, PAL[i % PAL.length]);
  }
  // Glow under the top of the tower
  const tipY = baseY - tallStack * bh;
  const tipG = ctx.createRadialGradient(baseX, tipY, 5, baseX, tipY, 180);
  tipG.addColorStop(0, 'rgba(255, 0, 110, 0.55)');
  tipG.addColorStop(1, 'rgba(255, 0, 110, 0)');
  ctx.fillStyle = tipG;
  ctx.fillRect(0, 0, W, H);

  // Wordmark — left side big
  chromText(ctx, 'GETABOUTIT', W * 0.38, H * 0.34, 84);

  // Tagline + zone teaser
  ctx.font = "20px 'Press Start 2P', monospace";
  ctx.textAlign = 'center';
  ctx.fillStyle = '#06ffa5';
  ctx.fillText('one-tap stacker · daily seed', W * 0.38, H * 0.50);

  ctx.font = "16px 'Press Start 2P', monospace";
  ctx.fillStyle = '#00f5ff';
  ctx.fillText('✦ GROUND · NEON CITY · CLOUDS · ORBIT · NEBULA · THE VOID ✦', W * 0.38, H * 0.62);

  ctx.font = "14px 'Press Start 2P', monospace";
  ctx.fillStyle = 'rgba(0,245,255,0.85)';
  ctx.textAlign = 'right';
  ctx.fillText('getaboutit.com', W - 28, H - 24);

  scanlines(ctx, W, H, 0.10);
}

function renderApple() {
  const canvas = document.getElementById('apple');
  const ctx = canvas.getContext('2d');
  const W = 180, H = 180;
  // Filled tile, no sky gradient — small icon
  ctx.fillStyle = '#0a0a1e';
  ctx.fillRect(0, 0, W, H);

  // Two offset blocks (pink + cyan)
  const w = 100, h = 78;
  // back: cyan
  ctx.fillStyle = '#00f5ff';
  ctx.fillRect(22, 50, w, h);
  // front: pink
  ctx.fillStyle = '#ff006e';
  ctx.fillRect(58, 28, w, h);

  // Inner highlights
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(58, 28, w, 6);
  ctx.fillRect(22, 50, w, 6);
}

function renderFavicon() {
  const canvas = document.getElementById('favicon');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.clearRect(0, 0, 32, 32);
  // back cyan, front pink — offset stacked
  ctx.fillStyle = '#00f5ff';
  ctx.fillRect(4, 10, 18, 14);
  ctx.fillStyle = '#ff006e';
  ctx.fillRect(10, 4, 18, 14);
}

function render(which) {
  if (which === 'og') renderOG();
  else if (which === 'apple') renderApple();
  else if (which === 'favicon') renderFavicon();
}

function renderAll() { renderOG(); renderApple(); renderFavicon(); }

function download(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  canvas.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, 'image/png');
}

document.fonts.ready.then(renderAll);
</script>

</body>
</html>
