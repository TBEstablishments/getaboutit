<body class="game">
<div class="stage">
  <div id="hud" class="hud">
    <span>CHIPS <b id="chips">1000</b></span>
    <span>BET <b id="bet">50</b></span>
    <span>BEST <b id="best">1000</b></span>
  </div>
  <canvas id="game" aria-label="Blackjack table"></canvas>
  <div id="status" class="status">PLACE YOUR BET</div>
  <div class="ctrls bet-ctrls" id="betCtrls">
    <button class="arcade cyan" id="betDown">−25</button>
    <button class="arcade green" id="dealBtn">DEAL</button>
    <button class="arcade cyan" id="betUp">+25</button>
  </div>
  <div class="ctrls play-ctrls hidden" id="playCtrls">
    <button class="arcade" id="hitBtn">HIT</button>
    <button class="arcade green" id="standBtn">STAND</button>
    <button class="arcade cyan" id="doubleBtn">DOUBLE</button>
    <button class="arcade yellow hidden" id="splitBtn">SPLIT</button>
  </div>
</div>
