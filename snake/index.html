<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>SNAKE · GETABOUTIT</title>
<meta name="description" content="Eat. Grow. Don't bite your tail." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="canonical" href="https://getaboutit.com/snake" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css?v=phase4" />
<link rel="stylesheet" href="/snake/style.css?v=phase4" />
</head>
<body class="game">
<main id="stage" class="stage">
  <canvas id="game" aria-label="SNAKE — swipe or arrow keys"></canvas>
  <div id="splash" class="screen">
    <h1 class="wordmark chrom"><span>SNAKE</span></h1>
    <p class="sub">swipe or arrow keys</p>
    <p class="tap pulse">▶ TAP TO PLAY</p>
    <button id="blitzToggle" type="button" class="arcade" style="padding:8px 12px;font-size:9px;">BLITZ MODE: <span id="blitzState">OFF</span></button>
  </div>
  <div id="over" class="screen hidden">
    <h2 class="big chrom"><span>GAME OVER</span></h2>
    <div class="score"><span class="chrom"><span id="final">0</span></span></div>
    <p class="stats">BEST <b id="best">0</b></p>
    <p class="tap pulse">▶ TAP TO RETRY</p>
  </div>
  <div id="hud" class="hidden"><span class="chrom"><span id="score">0</span></span></div>
</main>
<script>window.GAME_KEY = 'snake';</script>
<script src="/shared/core.js?v=phase4"></script>
<script src="/shared/shell.js?v=phase4"></script>
<script src="/snake/game.js?v=phase4"></script>
</body>
</html>
