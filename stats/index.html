<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>STATS · GETABOUTIT</title>
<meta name="description" content="Your arcade stats — best scores, daily play history, time per game." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="canonical" href="https://getaboutit.com/stats" />

<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css?v=phase4" />
<link rel="stylesheet" href="/stats/style.css?v=phase4" />
<script>window.GAME_KEY = '';</script>
<script src="/shared/core.js?v=phase4" defer></script>
<script src="/shared/shell.js?v=phase4" defer></script>
</head>
<body>
<main class="page">
  <h1 class="wordmark chrom"><span>STATS</span></h1>

  <section class="card">
    <h2>OVERVIEW</h2>
    <div class="stats-grid" id="overview"></div>
  </section>

  <section class="card">
    <h2>DAILY PLAYS — LAST 30 DAYS</h2>
    <canvas id="dailyChart" aria-label="Daily plays chart"></canvas>
  </section>

  <section class="card">
    <h2>MOST PLAYED</h2>
    <canvas id="mostChart" aria-label="Most played games chart"></canvas>
  </section>

  <section class="card">
    <h2>BEST SCORES</h2>
    <div class="best-grid" id="bestGrid"></div>
  </section>

  <section class="card">
    <h2>TIME PER GAME</h2>
    <div class="time-grid" id="timeGrid"></div>
  </section>

  <section class="card">
    <h2>ACHIEVEMENTS</h2>
    <div class="ach-grid" id="achGrid"></div>
  </section>

  <p class="back-link-wrap"><a href="/" class="back-link">← BACK TO ARCADE</a></p>
</main>
<script src="/stats/stats.js?v=phase4" defer></script>
</body>
</html>
