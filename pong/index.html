<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>PONG · GETABOUTIT</title>
<meta name="description" content="First to eleven. Vaporwave Pong." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="canonical" href="https://getaboutit.com/pong" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css?v=phase4" />
<link rel="stylesheet" href="/pong/style.css?v=phase4" />
</head>
<body class="game">
<main id="stage" class="stage">
  <canvas id="game" aria-label="PONG"></canvas>
  <div id="splash" class="screen">
    <h1 class="wordmark chrom"><span>PONG</span></h1>
    <p class="sub">first to eleven</p>
    <p class="tap pulse">▶ TAP TO PLAY</p>
  </div>
  <div id="over" class="screen hidden">
    <h2 class="big chrom"><span id="result">YOU WIN</span></h2>
    <p class="score-line"><span class="chrom"><span id="ps">0</span></span> — <span class="chrom"><span id="as">0</span></span></p>
    <p class="stats">BEST <b id="best">0</b></p>
    <p class="tap pulse">▶ TAP TO REMATCH</p>
  </div>
  <div id="hud" class="hidden">
    <span class="chrom"><span id="pscore">0</span></span>
    <span class="dash">·</span>
    <span class="chrom"><span id="ascore">0</span></span>
  </div>
</main>
<script>window.GAME_KEY = 'pong';</script>
<script src="/shared/core.js?v=phase4"></script>
<script src="/shared/shell.js?v=phase4"></script>
<script src="/pong/game.js?v=phase4"></script>
</body>
</html>
