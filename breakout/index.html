<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>BREAKOUT · GETABOUTIT</title>
<meta name="description" content="Smash every brick." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="canonical" href="https://getaboutit.com/breakout" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css?v=phase4" />
<link rel="stylesheet" href="/breakout/style.css?v=phase4" />
</head>
<body class="game">
<main id="stage" class="stage">
  <canvas id="game" aria-label="BREAKOUT"></canvas>
  <div id="splash" class="screen">
    <h1 class="wordmark chrom"><span>BREAKOUT</span></h1>
    <p class="sub">drag to move</p>
    <p class="tap pulse">▶ TAP TO PLAY</p>
  </div>
  <div id="over" class="screen hidden">
    <h2 class="big chrom"><span id="result">GAME OVER</span></h2>
    <div class="score"><span class="chrom"><span id="final">0</span></span></div>
    <p class="stats">BEST <b id="best">0</b></p>
    <p class="tap pulse">▶ TAP TO RETRY</p>
  </div>
  <div id="hud" class="hidden">
    <span><span class="chrom"><span id="score">0</span></span></span>
    <span class="lives" id="lives">♥♥♥</span>
  </div>
</main>
<script>window.GAME_KEY = 'breakout';</script>
<script src="/shared/core.js?v=phase4"></script>
<script src="/shared/shell.js?v=phase4"></script>
<script src="/breakout/game.js?v=phase4"></script>
</body>
</html>
