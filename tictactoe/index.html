<body class="game">
<main id="stage" class="stage">

    <h1 class="title chrom"><span>TIC TAC TOE</span></h1>

      <button id="diff" class="arcade cyan" type="button" aria-label="Toggle difficulty">HARD</button>

    </div>
  </header>
  <canvas id="board" aria-label="Tic Tac Toe board"></canvas>
  <div class="status" id="status">YOUR MOVE</div>
</main>
