<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="Cache-Control" content="no-cache, must-revalidate" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PIXEL · GETABOUTIT</title>
<meta name="description" content="Picross — paint by numbers. Reveal the pixel art." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="canonical" href="https://getaboutit.com/pixel" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css?v=phase4" />
<link rel="stylesheet" href="/pixel/style.css?v=phase4" />
<script>window.GAME_KEY = 'pixel';</script>
<script src="/shared/core.js?v=phase4" defer></script>
<script src="/shared/shell.js?v=phase4" defer></script>
</head>
<body class="game">
<div class="stage">
  <div id="hud" class="hud">
    <span>SIZE <b id="sz">5</b></span>
    <span>MISTAKES <b id="mist">0</b>/3</span>
    <span>BEST <b id="best">—</b></span>
  </div>
  <canvas id="board" aria-label="Picross board"></canvas>
  <div id="status" class="status">FILL TO MATCH THE NUMBERS</div>
  <div class="ctrls">
    <button class="arcade cyan" id="sizeBtn">SIZE</button>
    <button class="arcade" id="modeBtn">MODE: FILL</button>
    <button class="arcade green" id="newBtn">NEW</button>
  </div>
</div>
<script src="/pixel/game.js?v=phase4" defer></script>
</body>
</html>
