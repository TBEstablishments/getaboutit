<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>SOLITAIRE · GETABOUTIT</title>
<meta name="description" content="Klondike Solitaire — draw three, classic time killer." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="canonical" href="https://getaboutit.com/solitaire" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css" />
<link rel="stylesheet" href="style.css" />
<script>window.GAME_KEY = 'solitaire';</script>
<script src="/shared/core.js"></script>
<script src="/shared/shell.js"></script>
</head>
<body>
<div class="stage">
  <div id="hud" class="hud">
    <span>MOVES <b id="moves">0</b></span>
    <span>WINS <b id="wins">0</b></span>
    <span>BEST <b id="best">—</b></span>
  </div>
  <canvas id="game" aria-label="Solitaire table"></canvas>
  <div class="ctrls">
    <button class="arcade cyan" id="undoBtn" type="button">UNDO</button>
    <button class="arcade green hidden" id="autoBtn" type="button">AUTO COMPLETE</button>
    <button class="arcade" id="newBtn" type="button">NEW</button>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
