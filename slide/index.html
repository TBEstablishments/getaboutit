<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<title>SLIDE · GETABOUTIT</title>
<meta name="description" content="Slide the tiles into order. Daily puzzle." />
<meta name="theme-color" content="#0a0a1e" />
<link rel="canonical" href="https://getaboutit.com/slide" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" />
<link rel="stylesheet" href="/shared/core.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<main id="stage" class="stage">
  <header class="head">
    <h1 class="title chrom"><span>SLIDE</span></h1>
    <p class="sub" id="daily">DAILY ·</p>
  </header>
  <canvas id="board" width="320" height="320" aria-label="Slide puzzle"></canvas>
  <div class="info">
    <span>MOVES <b id="moves">0</b></span>
    <span class="sep">·</span>
    <span>TIME <b id="time">0:00</b></span>
    <span class="sep">·</span>
    <span>BEST <b id="best">—</b></span>
  </div>
  <button id="reset" class="arcade" type="button">SHUFFLE</button>
</main>
<script>window.GAME_KEY = 'slide';</script>
<script src="/shared/core.js"></script>
<script src="/shared/shell.js"></script>
<script src="game.js"></script>
</body>
</html>
