<body class="game">
<div class="stage">
  <div id="hud" class="hud">
    <span>BLACK ●<b id="pCap">0</b></span>
    <span>WHITE ○<b id="aCap">0</b></span>
    <span id="diffTag">HARD</span>

  <canvas id="board" aria-label="Go board"></canvas>
  <div id="status" class="status">YOUR MOVE — BLACK</div>
  <div class="ctrls">
    <button class="arcade cyan" id="passBtn">PASS</button>
    <button class="arcade" id="diffBtn">DIFFICULTY</button>
    <button class="arcade green" id="newBtn">NEW</button>
  </div>
</div>
