<body class="game">
<div class="stage">
  <div id="hud" class="hud">
    <span id="diffTag">DAILY · MEDIUM</span>
    <span><b id="time">0:00</b></span>
  </div>
  <canvas id="board" aria-label="Sudoku board"></canvas>
  <div class="keypad" id="keypad">
    <button class="num" data-n="1">1</button><button class="num" data-n="2">2</button><button class="num" data-n="3">3</button>
    <button class="num" data-n="4">4</button><button class="num" data-n="5">5</button><button class="num" data-n="6">6</button>
    <button class="num" data-n="7">7</button><button class="num" data-n="8">8</button><button class="num" data-n="9">9</button>
    <button class="op" id="pencilBtn">✎</button>
    <button class="op" id="eraseBtn">⌫</button>
    <button class="op" id="hintBtn">💡 <span id="hints">3</span></button>
  </div>
  <div class="ctrls">
    <button class="arcade" id="diffBtn" type="button">DIFFICULTY</button>
    <button class="arcade cyan" id="checkBtn" type="button">CHECK <span id="checks">3</span></button>
    <button class="arcade green hidden" id="winBtn" type="button">✦ SOLVED — NEW PUZZLE</button>
  </div>
</div>
<script src="/sudoku/game.js?v=phase4"></script>
